<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Travel Stamp Collection</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fe;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #travel-map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Website header with title & subtitle */
        .website-header {
            position: absolute;
            top: 20px;
            left: 24px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 12px 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            pointer-events: none;
            max-width: 80%;
        }

        .website-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2a3e, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .website-header p {
            font-size: 0.85rem;
            color: #2c3e50;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Modern glass panel (countries list) */
        .destinations-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            padding: 20px 0 16px 0;
            z-index: 1000;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .panel-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 0 20px 12px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .panel-header h3 {
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e2a3e, #0f172a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .panel-header span {
            font-size: 0.8rem;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 500;
            color: #1e3a8a;
        }

        .destinations-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 8px 12px 4px 12px;
            scrollbar-width: thin;
        }

        .destinations-list::-webkit-scrollbar {
            width: 4px;
        }

        .destinations-list::-webkit-scrollbar-track {
            background: #e9eef3;
            border-radius: 10px;
        }

        .destinations-list::-webkit-scrollbar-thumb {
            background: #b9c3d0;
            border-radius: 10px;
        }

        .destination-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 12px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            transition: all 0.2s ease;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 1px solid transparent;
        }

        .destination-item:hover {
            background: white;
            border-color: rgba(255, 126, 54, 0.3);
            transform: translateX(4px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
        }

        .dest-emoji {
            font-size: 1.8rem;
            width: 44px;
            height: 44px;
            background: #ffffffd9;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .dest-info {
            flex: 1;
        }

        .dest-info h4 {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
            color: #0b2b3b;
        }

        .dest-info p {
            font-size: 0.75rem;
            color: #4b5565;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .dest-item-icon {
            color: #f97316;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Custom marker style */
        .custom-marker-div {
            background: white;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2), 0 0 0 3px rgba(255, 126, 54, 0.3);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 2px solid white;
        }

        .custom-marker-div i {
            font-size: 1.3rem;
            color: #f45b0e;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }

        .custom-marker-div:hover {
            transform: scale(1.12);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25), 0 0 0 3px rgba(255, 126, 54, 0.5);
        }

        /* Popup styling – 6 images grid */
        .leaflet-popup-content-wrapper {
            background: rgba(20, 25, 40, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            color: #f0f3fa;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,240,0.2);
            padding: 0;
        }

        .leaflet-popup-tip {
            background: rgba(20, 25, 40, 0.96);
            border: 1px solid rgba(255,255,240,0.2);
        }

        .leaflet-popup-content {
            margin: 12px 16px;
            width: auto !important;
            min-width: 320px;
            max-width: 480px;
            font-family: 'Inter', sans-serif;
        }

        /* 6‑image gallery grid (2 columns, 3 rows) */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 12px 0;
        }

        .gallery-img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.2s ease, border 0.2s;
            cursor: pointer;
            background: #2d3748;
        }

        .gallery-img:hover {
            transform: scale(1.02);
            border-color: #f97316;
        }

        .popup-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .popup-title i {
            color: #f97316;
            font-size: 1rem;
        }

        .popup-desc {
            font-size: 0.8rem;
            line-height: 1.4;
            color: #cdd9ff;
            margin-bottom: 12px;
        }

        .popup-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f97316;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.7rem;
            transition: 0.2s;
            margin-top: 4px;
        }

        .popup-link:hover {
            background: #ff8c42;
            transform: scale(0.97);
        }

        /* Lightbox modal for fullscreen images */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .close-lightbox {
            position: absolute;
            top: 24px;
            right: 32px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .close-lightbox:hover {
            background: #f97316;
            transform: scale(1.05);
        }

        .map-attribution-note {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.65rem;
            color: #ddd;
            z-index: 1000;
            font-weight: 400;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .destinations-panel {
                max-width: 280px;
                bottom: 16px;
                left: 16px;
                right: auto;
            }
            .website-header h1 {
                font-size: 1.2rem;
            }
            .website-header p {
                font-size: 0.7rem;
            }
            .leaflet-popup-content {
                max-width: 280px;
                min-width: 260px;
            }
            .photo-gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
        }
    </style>
</head>
<body>

<div id="travel-map"></div>

<!-- Website title and subtitle -->
<div class="website-header">
    <h1>📌 My travel stamp collection</h1>
    <p>This map illustrates the countries I have visited for both work and vacations.</p>
</div>

<!-- Glass panel with countries (A-Z) -->
<div class="destinations-panel">
    <div class="panel-header">
        <h3><i class="fas fa-globe-americas" style="font-size: 1.1rem; margin-right: 6px; color: #f97316;"></i> country collection</h3>
        <span id="country-count">22 nations</span>
    </div>
    <div class="destinations-list" id="dest-list-container">
        <div style="text-align: center; padding: 12px;"><i class="fas fa-spinner fa-pulse"></i> loading destinations...</div>
    </div>
</div>

<!-- Lightbox modal for fullscreen image -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="Fullscreen view">
</div>

<div class="map-attribution-note">
    <i class="fas fa-camera"></i> click photos → fullscreen
</div>

<script>
    // ==================== COUNTRY DATABASE (A-Z SORTED) ====================
    // Based on the provided HTML file – all countries with coordinates and descriptions
    const rawCountries = [
        { name: "Austria", lat: 48.2082, lng: 16.3738, flag: "🇦🇹", description: "Alpine majesty, classical music, imperial palaces, and charming villages." },
        { name: "Cambodia", lat: 12.5657, lng: 104.9910, flag: "🇰🇭", description: "Home to Angkor Wat, ancient temples, and lush landscapes. A land of rich Khmer heritage." },
        { name: "China", lat: 39.9042, lng: 116.4074, flag: "🇨🇳", description: "Ancient wonders, futuristic cities, and the Great Wall." },
        { name: "Denmark", lat: 55.6761, lng: 12.5683, flag: "🇩🇰", description: "Hygge lifestyle, Viking history, and modern Scandinavian design." },
        { name: "Ethiopia", lat: 9.0320, lng: 38.7469, flag: "🇪🇹", description: "Ancient rock churches, coffee origins, and breathtaking highlands." },
        { name: "Fiji", lat: -18.1416, lng: 178.4419, flag: "🇫🇯", description: "Coral reefs, turquoise waters, and Bula spirit." },
        { name: "Finland", lat: 60.1699, lng: 24.9384, flag: "🇫🇮", description: "A thousand lakes, Nordic saunas, and the magical Northern Lights." },
        { name: "France", lat: 48.8566, lng: 2.3522, flag: "🇫🇷", description: "Art, romance, cuisine, and iconic landmarks from coast to countryside." },
        { name: "Germany", lat: 52.5200, lng: 13.4050, flag: "🇩🇪", description: "Castles, beer gardens, fairy-tale forests, and cutting-edge innovation." },
        { name: "Indonesia", lat: -6.2088, lng: 106.8456, flag: "🇮🇩", description: "Thousands of islands, volcanoes, rainforests, and vibrant cultures." },
        { name: "Laos", lat: 17.9757, lng: 102.6331, flag: "🇱🇦", description: "Serene mountains, Buddhist monasteries, and the mighty Mekong River." },
        { name: "Malaysia", lat: 3.1390, lng: 101.6869, flag: "🇲🇾", description: "Rainforests, skyscrapers, diverse cultures, and culinary fusion." },
        { name: "Netherlands", lat: 52.3702, lng: 4.8952, flag: "🇳🇱", description: "Windmills, tulip fields, canals, and vibrant cycling culture." },
        { name: "Philippines", lat: 14.5995, lng: 120.9842, flag: "🇵🇭", description: "Over 7,000 islands, pristine beaches, and warm hospitality." },
        { name: "Singapore", lat: 1.3521, lng: 103.8198, flag: "🇸🇬", description: "Garden city, futuristic skyline, and multicultural melting pot." },
        { name: "Spain", lat: 40.4168, lng: -3.7038, flag: "🇪🇸", description: "Flamenco, siesta, tapas, and a mosaic of historic cities." },
        { name: "Sweden", lat: 59.3293, lng: 18.0686, flag: "🇸🇪", description: "Archipelagos, minimalist design, and endless summer light." },
        { name: "Switzerland", lat: 46.9480, lng: 7.4474, flag: "🇨🇭", description: "Alpine peaks, pristine lakes, chocolate, and precision watchmaking." },
        { name: "Thailand", lat: 13.7367, lng: 100.5231, flag: "🇹🇭", description: "Land of smiles, golden temples, vibrant street food, and tropical beaches." },
        { name: "United Kingdom", lat: 51.5074, lng: -0.1278, flag: "🇬🇧", description: "Royal heritage, literary legends, rolling countryside, and dynamic cities." },
        { name: "Vietnam", lat: 21.0285, lng: 105.8542, flag: "🇻🇳", description: "Dramatic landscapes, bustling cities, and aromatic street food." },
        { name: "Zambia", lat: -15.3875, lng: 28.3228, flag: "🇿🇲", description: "Victoria Falls, wild safaris, and the mighty Zambezi River." }
    ];

    // Sort alphabetically by country name
    const countries = [...rawCountries].sort((a, b) => a.name.localeCompare(b.name));
    document.getElementById('country-count').innerText = `${countries.length} nations`;

    // ==================== IMAGE SOURCES – EXTRACTED FROM THE HTML ====================
    // For each country we have exactly one image from the provided explore.html.
    // To meet the requirement of six photos per country, we repeat the same image six times.
    // You can easily replace these arrays with actual multiple images when you have them.
    // Just edit the getCountryImages() function below.
    function getCountryImages(countryName) {
        // Map country names to their image URL (full-size, from the HTML)
        const imageMap = {
            "Austria": "static/img/explore/Austria24.jpg",
            "Austria": "static/img/explore/e1.jpg",
            "Cambodia": "static/img/explore/e1.jpg",
            "China": "static/img/explore/China24.jpg",
            "Denmark": "static/img/explore/e8.jpg",
            "Ethiopia": "static/img/explore/Ethiopia25.jpg",
            "Fiji": "static/img/explore/Fiji24.jpg",
            "Finland": "static/img/explore/e6.jpg",
            "France": "static/img/explore/e3.jpg",
            "Germany": "static/img/explore/e9.jpg",
            "Indonesia": "static/img/explore/e5.jpg",
            "Laos": "static/img/explore/e11.jpg",
            "Malaysia": "static/img/explore/Malaysia24.jpg",
            "Netherlands": "static/img/explore/Netherlands24.jpg",
            "Philippines": "static/img/explore/Phillipines25.jpg",
            "Singapore": "static/img/explore/Singapore24.jpg",
            "Spain": "static/img/explore/e2.jpg",
            "Sweden": "static/img/explore/Stockholm.jpg",
            "Switzerland": "static/img/explore/e10.jpg",
            "Thailand": "static/img/explore/e4.jpg",
            "United Kingdom": "static/img/explore/e12.jpg",
            "Vietnam": "static/img/explore/e7.jpg",
            "Zambia": "static/img/explore/Zambia25.jpg"
        };

        const baseImage = imageMap[countryName] || "static/img/explore/placeholder.jpg";

        // Create an array of six copies of the same image.
        // Replace this with actual different images if available.
        return [
            baseImage,
            baseImage,
            baseImage,
            baseImage,
            baseImage,
            baseImage
        ];
    }

    // Lightbox functions
    function openLightbox(imageSrc) {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = imageSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('active')) {
            closeLightbox();
        }
    });

    // ==================== MAP SETUP ====================
    const map = L.map('travel-map').setView([20, 10], 2.2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19,
        minZoom: 2
    }).addTo(map);

    const markersMap = {};

    function createCustomMarkerIcon() {
        return L.divIcon({
            className: '',
            html: '<div class="custom-marker-div"><i class="fas fa-map-pin"></i></div>',
            iconSize: [42, 42],
            popupAnchor: [0, -22],
            tooltipAnchor: [0, -10]
        });
    }

    // Generate popup content with 6 images
    function createPopupContent(country) {
        const images = getCountryImages(country.name);
        let galleryHtml = `<div class="photo-gallery" id="gallery-${country.name.replace(/\s/g, '')}">`;
        images.forEach((src, idx) => {
            galleryHtml += `<img class="gallery-img" src="${src}" loading="lazy" alt="${country.name} view ${idx+1}" 
                            onerror="this.onerror=null; this.src='https://picsum.photos/id/104/300/200';">`;
        });
        galleryHtml += `</div>`;

        const wikiLink = `https://en.wikipedia.org/wiki/${country.name.replace(/ /g, '_')}`;
        return `
            <div>
                <div class="popup-title">
                    <i class="fas fa-map-marker-alt"></i> ${country.name} ${country.flag}
                </div>
                <div class="popup-desc">${country.description}</div>
                ${galleryHtml}
                <a href="${wikiLink}" target="_blank" rel="noopener noreferrer" class="popup-link">
                    <i class="fas fa-compass"></i> discover more
                </a>
            </div>
        `;
    }

    // Add markers
    countries.forEach(country => {
        const marker = L.marker([country.lat, country.lng], {
            icon: createCustomMarkerIcon(),
            riseOnHover: true
        }).bindPopup(createPopupContent(country), {
            maxWidth: 480,
            minWidth: 320,
            className: 'modern-popup'
        }).addTo(map);
        
        markersMap[country.name] = marker;

        // Attach click handlers to images when popup opens
        marker.on('popupopen', () => {
            setTimeout(() => {
                const popupNode = document.querySelector('.leaflet-popup-content');
                if (!popupNode) return;
                const imagesInPopup = popupNode.querySelectorAll('.gallery-img');
                imagesInPopup.forEach(img => {
                    img.removeEventListener('click', img.clickHandler);
                    const clickHandler = (e) => {
                        e.stopPropagation();
                        openLightbox(img.src);
                    };
                    img.addEventListener('click', clickHandler);
                    img.clickHandler = clickHandler;
                });
            }, 50);
        });
    });

    // ==================== POPULATE A-Z LIST ====================
    const destListContainer = document.getElementById('dest-list-container');
    destListContainer.innerHTML = '';
    countries.forEach(country => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'destination-item';
        itemDiv.innerHTML = `
            <div class="dest-emoji">${country.flag}</div>
            <div class="dest-info">
                <h4>${country.name}</h4>
                <p>${country.description.substring(0, 70)}${country.description.length > 70 ? '…' : ''}</p>
            </div>
            <div class="dest-item-icon"><i class="fas fa-arrow-right"></i></div>
        `;
        itemDiv.addEventListener('click', () => {
            const marker = markersMap[country.name];
            if (marker) {
                map.flyTo([country.lat, country.lng], 8, { duration: 1.2 });
                setTimeout(() => marker.openPopup(), 200);
                // Highlight effect
                const allItems = document.querySelectorAll('.destination-item');
                allItems.forEach(item => item.style.background = 'rgba(255,255,255,0.6)');
                itemDiv.style.background = 'white';
                itemDiv.style.border = '1px solid #f97316';
                setTimeout(() => {
                    itemDiv.style.background = '';
                    itemDiv.style.border = '';
                }, 500);
            }
        });
        destListContainer.appendChild(itemDiv);
    });

    // Additional map controls
    map.zoomControl.setPosition('bottomright');
    L.control.scale({ metric: true, imperial: true, position: 'bottomleft' }).addTo(map);

    // Reset view button
    const resetButton = document.createElement('div');
    resetButton.innerHTML = '<i class="fas fa-globe-asia"></i>';
    resetButton.title = "Reset world view";
    resetButton.style.position = 'absolute';
    resetButton.style.bottom = '110px';
    resetButton.style.right = '16px';
    resetButton.style.background = 'rgba(255,255,255,0.9)';
    resetButton.style.backdropFilter = 'blur(8px)';
    resetButton.style.width = '44px';
    resetButton.style.height = '44px';
    resetButton.style.borderRadius = '30px';
    resetButton.style.display = 'flex';
    resetButton.style.alignItems = 'center';
    resetButton.style.justifyContent = 'center';
    resetButton.style.cursor = 'pointer';
    resetButton.style.boxShadow = '0 4px 14px rgba(0,0,0,0.15)';
    resetButton.style.zIndex = '1000';
    resetButton.style.fontSize = '1.3rem';
    resetButton.style.color = '#f97316';
    resetButton.style.border = '1px solid rgba(0,0,0,0.05)';
    resetButton.style.transition = 'all 0.2s';
    resetButton.onmouseover = () => resetButton.style.transform = 'scale(1.05)';
    resetButton.onmouseleave = () => resetButton.style.transform = 'scale(1)';
    resetButton.onclick = () => {
        map.flyTo([20, 10], 2.2, { duration: 1.2 });
        map.closePopup();
    };
    document.body.appendChild(resetButton);

    // Tooltips for markers
    countries.forEach(country => {
        const marker = markersMap[country.name];
        if (marker) {
            marker.bindTooltip(`${country.name}  ${country.flag}`, {
                sticky: true,
                offset: [0, -20],
                direction: 'top',
                className: 'custom-tooltip'
            });
        }
    });

    const styleTooltip = document.createElement('style');
    styleTooltip.textContent = `
        .custom-tooltip {
            background: rgba(0,0,0,0.75) !important;
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 24px;
            color: #ffeedd;
            font-weight: 500;
            font-size: 0.75rem;
            padding: 5px 12px;
            font-family: 'Inter', sans-serif;
        }
        .custom-tooltip::before {
            border-top-color: rgba(0,0,0,0.75);
        }
    `;
    document.head.appendChild(styleTooltip);

    // Panel entrance animation
    const panel = document.querySelector('.destinations-panel');
    if (panel) {
        panel.style.opacity = '0';
        panel.style.transform = 'translateY(20px)';
        setTimeout(() => {
            panel.style.transition = 'all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            panel.style.opacity = '1';
            panel.style.transform = 'translateY(0)';
        }, 100);
    }
    resetButton.style.opacity = '0';
    setTimeout(() => {
        resetButton.style.transition = 'opacity 0.4s';
        resetButton.style.opacity = '1';
    }, 200);

    console.log(`✅ Map ready: ${countries.length} countries, 6 photos each (repeated from your existing images). To add distinct photos, edit getCountryImages() in the script.`);
</script>
</body>
</html>
