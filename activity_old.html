  // Add year field
  activities.forEach(a => {
    let match = a.date.match(/\d{4}/);
    a.year = match ? match[0] : "2026";
  });

  // ----- SDG options ordered 1-17 -----
  const sdgOptions = [
    "SDG 1 - No Poverty", "SDG 2 - Zero Hunger", "SDG 3 - Good Health and Well-being",
    "SDG 4 - Quality Education", "SDG 5 - Gender Equality", "SDG 6 - Clean Water and Sanitation",
    "SDG 7 - Affordable and Clean Energy", "SDG 8 - Decent Work and Economic Growth",
    "SDG 9 - Industry, Innovation and Infrastructure", "SDG 10 - Reduced Inequalities",
    "SDG 11 - Sustainable Cities and Communities", "SDG 12 - Responsible Consumption and Production",
    "SDG 13 - Climate Action", "SDG 14 - Life Below Water", "SDG 15 - Life on Land",
    "SDG 16 - Peace, Justice and Strong Institutions", "SDG 17 - Partnerships for the Goals"
  ];

  function getSdgCounts() {
    let counts = {};
    sdgOptions.forEach(s => counts[s] = 0);
    activities.forEach(a => {
      if (a.sdg) {
        a.sdg.forEach(s => {
          let matched = sdgOptions.find(opt => opt.startsWith(s.split(' ')[0]));
          if (matched) counts[matched]++;
          else if (s.includes("SDG 8")) counts["SDG 8 - Decent Work and Economic Growth"]++;
          else if (s.includes("SDG 13")) counts["SDG 13 - Climate Action"]++;
          else if (s.includes("SDG 1")) counts["SDG 1 - No Poverty"]++;
          else if (s.includes("SDG 2")) counts["SDG 2 - Zero Hunger"]++;
          else if (s.includes("SDG 5")) counts["SDG 5 - Gender Equality"]++;
          else if (s.includes("SDG 16")) counts["SDG 16 - Peace, Justice and Strong Institutions"]++;
          else counts["SDG 8 - Decent Work and Economic Growth"]++;
        });
      } else {
        counts["SDG 8 - Decent Work and Economic Growth"]++;
      }
    });
    return counts;
  }

  function renderSdgList() {
    const container = document.getElementById('sdgList');
    const counts = getSdgCounts();
    let html = '';
    sdgOptions.forEach((label, idx) => {
      const cnt = counts[label] || 0;
      const hiddenClass = idx >= 5 ? 'sdg-hidden' : '';
      html += `<label class="custom-check ${hiddenClass}"><input type="checkbox" data-sdg="${label}"> <span class="check-box"></span><span class="custom-check-left"><span>${label}</span><span class="count-badge">(${cnt})</span></span></label>`;
    });
    container.innerHTML = html;
    let expanded = false;
    document.getElementById('toggleSdgBtn').onclick = () => {
      expanded = !expanded;
      const all = document.querySelectorAll('#sdgList .custom-check');
      all.forEach((c, i) => { if (expanded) c.classList.remove('sdg-hidden'); else if (i >= 5) c.classList.add('sdg-hidden'); });
      document.getElementById('toggleSdgBtn').innerText = expanded ? 'Show less' : 'Show more ›';
    };
  }

  // Year filter
  function renderYearFilters() {
    const years = [...new Set(activities.map(a => a.year))].sort((a,b)=>b-a);
    const container = document.getElementById('yearFilters');
    container.innerHTML = years.map(y => `<label class="custom-check"><input type="checkbox" data-year="${y}"> <span class="check-box"></span><span class="custom-check-left"><span>${y}</span><span class="count-badge">(${activities.filter(a=>a.year===y).length})</span></span></label>`).join('');
  }

  // Full activity type list (as per screenshot)
  const allActivityTypes = [
    "Talks and presentations in private or public companies",
    "Conference organisation or participation",
    "Conference presentations",
    "Organisation or participation in workshops, courses, seminars, exhibitions or similar",
    "Peer review of manuscripts",
    "Membership of committees, commissions, boards, councils, associations, organisations, or similar",
    "Membership of review committee",
    "Other",
    "Membership of research networks or expert groups",
    "External examination",
    "Guest lecturers",
    "External teaching and course activities at other universities",
    "Journal editor",
    "Board duties in companies, associations, or public organisations",
    "Visiting another research institution",
    "Consultancy",
    "Internal examination",
    "Hosting a guest lecturer",
    "Series editor",
    "Public Sector Consultancy",
    "Editor of unfinished research anthology/collection",
    "External PhD Supervision",
    "Internal PhD Supervision",
    "Employment with any other public or private company including your own company",
    "Starting your own company"
  ];

  function getTypeCounts() {
    let counts = {};
    allActivityTypes.forEach(t => counts[t] = 0);
    activities.forEach(a => {
      let matched = allActivityTypes.find(tt => tt === a.typeCategory);
      if (matched) counts[matched]++;
      else counts["Other"]++;
    });
    return counts;
  }

  function renderTypeDetail() {
    const container = document.getElementById('typeDetailList');
    const counts = getTypeCounts();
    let html = '';
    allActivityTypes.forEach((type, idx) => {
      const cnt = counts[type] || 0;
      const hiddenClass = idx >= 5 ? 'type-hidden' : '';
      html += `<label class="custom-check ${hiddenClass}"><input type="checkbox" data-activity-type="${type}"> <span class="check-box"></span><span class="custom-check-left"><span>${type}</span><span class="count-badge">(${cnt})</span></span></label>`;
    });
    container.innerHTML = html;
    let expanded = false;
    document.getElementById('toggleTypeBtn').onclick = () => {
      expanded = !expanded;
      const all = document.querySelectorAll('#typeDetailList .custom-check');
      all.forEach((c, i) => { if (expanded) c.classList.remove('type-hidden'); else if (i >= 5) c.classList.add('type-hidden'); });
      document.getElementById('toggleTypeBtn').innerText = expanded ? 'Show less' : 'Show more ›';
    };
  }

  // Update top pills
  function updateTypePills() {
    document.getElementById('totalActivitiesCount').innerText = activities.length;
    document.getElementById('confCount').innerText = activities.filter(a=>a.type==='Conference presentation' || a.type==='Keynote').length;
    document.getElementById('seminarCount').innerText = activities.filter(a=>a.type==='Seminar').length;
    document.getElementById('workshopCount').innerText = activities.filter(a=>a.type==='Workshop'||a.type==='Participation'||a.type==='Keynote').length;
    document.getElementById('orgCount').innerText = activities.filter(a=>a.type==='Organisation'||a.type==='Consultancy').length;
  }

  // Filtering and pagination
  let currentPage = 1;
  const ITEMS_PER_PAGE = 50;
  let currentSearch = '';

  function getFilteredActivities() {
    let filtered = [...activities];
    if (currentSearch.trim()) {
      const term = currentSearch.trim().toLowerCase();
      filtered = filtered.filter(a => a.title.toLowerCase().includes(term) || (a.description && a.description.toLowerCase().includes(term)));
    }
    const selectedSdg = Array.from(document.querySelectorAll('#sdgList input:checked')).map(cb => cb.getAttribute('data-sdg'));
    if (selectedSdg.length) {
      filtered = filtered.filter(a => a.sdg && a.sdg.some(s => selectedSdg.some(sel => sel.startsWith(s.split(' ')[0]) || s.startsWith(sel.split(' ')[0]))));
    }
    const selectedYears = Array.from(document.querySelectorAll('#yearFilters input:checked')).map(cb => cb.getAttribute('data-year'));
    if (selectedYears.length) filtered = filtered.filter(a => selectedYears.includes(a.year));
    const selectedTypes = Array.from(document.querySelectorAll('#typeDetailList input:checked')).map(cb => cb.getAttribute('data-activity-type'));
    if (selectedTypes.length) {
      filtered = filtered.filter(a => selectedTypes.includes(a.typeCategory));
    }
    return filtered;
  }

  function renderActivities() {
    const filtered = getFilteredActivities();
    const total = filtered.length;
    const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const start = (currentPage-1)*ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start+ITEMS_PER_PAGE);
    const grouped = {};
    pageItems.forEach(a => { if (!grouped[a.year]) grouped[a.year] = []; grouped[a.year].push(a); });
    const yearsSorted = Object.keys(grouped).sort((a,b)=>b-a);
    let html = '';
    for (let y of yearsSorted) {
      html += `<div class="year-header">${y}</div>`;
      for (let a of grouped[y]) {
        html += `<div class="activity">
          <div class="right-stats"><div class="altmetric-donut"><svg viewBox="0 0 100 100" width="48"><circle cx="50" cy="50" r="8" fill="#7b3fa0"/><circle cx="50" cy="18" r="7" fill="#e8821a"/><circle cx="76" cy="30" r="6" fill="#7b3fa0"/><circle cx="82" cy="60" r="6" fill="#7b3fa0"/><circle cx="62" cy="82" r="6" fill="#7b3fa0"/><circle cx="36" cy="80" r="5" fill="#7b3fa0"/><circle cx="20" cy="60" r="5" fill="#c0c0c0"/><circle cx="26" cy="30" r="5" fill="#7b3fa0"/><line x1="50" y1="50" x2="50" y2="18" stroke="#7b3fa0" stroke-width="2.5"/><line x1="50" y1="50" x2="76" y2="30" stroke="#7b3fa0" stroke-width="2.5"/><line x1="50" y1="50" x2="82" y2="60" stroke="#7b3fa0" stroke-width="2.5"/><line x1="50" y1="50" x2="62" y2="82" stroke="#7b3fa0" stroke-width="2.5"/><line x1="50" y1="50" x2="36" y2="80" stroke="#7b3fa0" stroke-width="2.5"/><line x1="50" y1="50" x2="20" y2="60" stroke="#c0c0c0" stroke-width="2.5"/><line x1="50" y1="50" x2="26" y2="30" stroke="#7b3fa0" stroke-width="2.5"/></svg></div></div>
          <div class="activity-details">
            <div class="activity-title">${a.title}</div>
            <div class="activity-person">${a.person} <strong>(${a.role})</strong></div>
            <div class="activity-date">${a.date}</div>
            <div class="activity-type-line">Activity: ${a.typeCategory} > ${a.type}</div>
            <div class="activity-description">${a.description || ''}</div>
            <div class="activity-keywords">${a.keywords.map(k => `<span class="keyword">${k}</span>`).join('')}</div>
          </div>
        </div>`;
      }
    }
    if (html === '') html = '<div style="padding: 2rem; text-align: center;">No activities match the selected filters.</div>';
    document.getElementById('activitiesContainer').innerHTML = html;
    document.getElementById('resultCount').innerHTML = total === 0 ? '0 results' : `${start+1} - ${Math.min(start+pageItems.length, total)} out of ${total} results`;
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const container = document.getElementById('paginationContainer');
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<a data-page="${currentPage-1}"><i class="fas fa-chevron-left"></i> Previous</a>`;
    else html += `<span class="disabled"><i class="fas fa-chevron-left"></i> Previous</span>`;
    let startPage = Math.max(1, currentPage-3);
    let endPage = Math.min(totalPages, startPage+6);
    if (endPage - startPage < 6 && startPage > 1) startPage = Math.max(1, endPage-6);
    if (startPage > 1) html += `<a data-page="1">1</a>`;
    if (startPage > 2) html += `<span class="ellipsis">...</span>`;
    for (let i=startPage; i<=endPage; i++) {
      if (i===currentPage) html += `<span class="active-page">${i}</span>`;
      else html += `<a data-page="${i}">${i}</a>`;
    }
    if (endPage < totalPages-1) html += `<span class="ellipsis">...</span>`;
    if (endPage < totalPages) html += `<a data-page="${totalPages}">${totalPages}</a>`;
    if (currentPage < totalPages) html += `<a data-page="${currentPage+1}">Next <i class="fas fa-chevron-right"></i></a>`;
    else html += `<span class="disabled">Next <i class="fas fa-chevron-right"></i></span>`;
    container.innerHTML = html;
    container.querySelectorAll('a[data-page]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        currentPage = parseInt(link.getAttribute('data-page'),10);
        renderActivities();
      });
    });
  }

  function resetAndRender() {
    currentPage = 1;
    renderActivities();
  }

  // Event listeners
  document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; resetAndRender(); });
  document.querySelectorAll('#sdgList, #yearFilters, #typeDetailList').forEach(container => {
    container.addEventListener('change', resetAndRender);
  });
  document.querySelectorAll('.type-pill[data-filter-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.getAttribute('data-filter-type');
      document.querySelectorAll('#typeDetailList input').forEach(cb => cb.checked = false);
      if (type !== 'all') {
        let targetLabel = "";
        if (type === "Conference presentation") targetLabel = "Conference presentations";
        else if (type === "Seminar") targetLabel = "Talks and presentations in private or public companies";
        else if (type === "Workshop") targetLabel = "Organisation or participation in workshops, courses, seminars, exhibitions or similar";
        else if (type === "Organisation") targetLabel = "Conference organisation or participation";
        const targetCb = document.querySelector(`#typeDetailList input[data-activity-type="${targetLabel}"]`);
        if (targetCb) targetCb.checked = true;
      }
      resetAndRender();
    });
  });

  // Initialization
  renderSdgList();
  renderYearFilters();
  renderTypeDetail();
  updateTypePills();
  renderActivities();
</script>
</body>
</html>
